<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶資料查詢系統 - n8n 串接版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 隱藏預設捲軸 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <!-- 頁面標題 -->
        <div class="flex flex-col items-center justify-center mb-10">
            <div class="bg-blue-100 p-3 rounded-2xl mb-4 shadow-sm">
                <i data-lucide="database" class="w-8 h-8 text-blue-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">客戶資料查詢系統</h1>
            <p class="text-gray-500">輸入客戶名稱或訂單編號，透過 n8n Webhook 即時取得資料</p>
        </div>

        <!-- 搜尋區塊 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8 max-w-3xl mx-auto">
            <form id="searchForm" class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-1">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="block w-full pl-11 pr-4 py-3.5 border border-gray-300 rounded-xl leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200" 
                        placeholder="請輸入姓名 (例如: Elizabeth)"
                    >
                </div>
                <div class="relative flex-1">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="hash" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input 
                        type="text" 
                        id="searchOrderId" 
                        class="block w-full pl-11 pr-4 py-3.5 border border-gray-300 rounded-xl leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200" 
                        placeholder="或輸入訂單編號 (例如: ORD2024019)"
                    >
                </div>
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="inline-flex items-center justify-center px-8 py-3.5 border border-transparent text-base font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200 shadow-sm whitespace-nowrap"
                >
                    <span id="btnText">送出查詢</span>
                    <div id="btnSpinner" class="hidden loader ease-linear rounded-full border-2 border-t-2 border-white h-5 w-5 ml-2"></div>
                </button>
            </form>
        </div>

        <!-- 系統訊息提示 -->
        <div id="alertBox" class="hidden max-w-3xl mx-auto mb-6 p-4 rounded-xl flex items-start gap-3 border transition-all duration-300">
            <i id="alertIcon" data-lucide="info" class="w-5 h-5 shrink-0 mt-0.5"></i>
            <div>
                <h3 id="alertTitle" class="text-sm font-bold"></h3>
                <p id="alertMessage" class="mt-1 text-sm opacity-90"></p>
            </div>
        </div>

        <!-- 結果表格區塊 -->
        <div id="resultCard" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden max-w-5xl mx-auto">
            <div class="px-6 py-5 border-b border-gray-200 bg-gray-50/50 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                    <i data-lucide="table" class="w-5 h-5 text-gray-500"></i>
                    查詢結果
                </h2>
            </div>
            
            <div class="overflow-x-auto hide-scrollbar">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider"># Row</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">訂單編號</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">客戶編號</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">姓名</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">訂單日期</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">商品名稱</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">訂單金額</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">訂單狀態</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-100">
                        <!-- 資料動態生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Icons
        lucide.createIcons();

        // 目標 Webhook 網址 (已更新為您的 n8n Production URL)
        const WEBHOOK_URL = "https://e5xntzdc.roamerhost.com/webhook/6dabfb16-2ce6-4d2b-9003-a72cac02102d";

        // DOM 元素
        const form = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const searchOrderIdInput = document.getElementById('searchOrderId');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertTitle = document.getElementById('alertTitle');
        const alertMessage = document.getElementById('alertMessage');
        
        const resultCard = document.getElementById('resultCard');
        const tableBody = document.getElementById('tableBody');

        // 控制載入中狀態
        function setLoadingState(isLoading) {
            submitBtn.disabled = isLoading;
            searchInput.disabled = isLoading;
            searchOrderIdInput.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = '處理中...';
                btnSpinner.classList.remove('hidden');
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
                alertBox.classList.add('hidden');
                resultCard.classList.add('hidden');
            } else {
                btnText.textContent = '送出查詢';
                btnSpinner.classList.add('hidden');
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // 顯示提示訊息
        function showAlert(type, title, message) {
            const styles = {
                success: 'bg-emerald-50 border-emerald-200 text-emerald-800',
                warning: 'bg-amber-50 border-amber-200 text-amber-800',
                error: 'bg-red-50 border-red-200 text-red-800'
            };
            const icons = {
                success: 'check-circle-2',
                warning: 'alert-triangle',
                error: 'x-circle'
            };

            alertBox.className = `max-w-3xl mx-auto mb-6 p-4 rounded-xl flex items-start gap-3 border transition-all duration-300 ${styles[type]}`;
            alertIcon.setAttribute('data-lucide', icons[type]);
            lucide.createIcons(); // 重新渲染 icon
            
            alertTitle.textContent = title;
            alertMessage.textContent = message;
            alertBox.classList.remove('hidden');
        }

        // 渲染表格資料
        function renderTable(dataArray) {
            tableBody.innerHTML = '';
            
            if (!dataArray || dataArray.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="8" class="px-6 py-12 text-center text-gray-500">找不到相符的資料</td>`;
                tableBody.appendChild(tr);
            } else {
                dataArray.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition-colors";
                    
                    // 根據狀態設定不同顏色的標籤
                    let statusClass = "bg-gray-100 text-gray-700 border-gray-200";
                    if (row['訂單狀態'] === '已完成') statusClass = "bg-emerald-100 text-emerald-700 border-emerald-200";
                    else if (row['訂單狀態'] === '已取消') statusClass = "bg-red-100 text-red-700 border-red-200";
                    else if (row['訂單狀態'] === '處理中') statusClass = "bg-blue-100 text-blue-700 border-blue-200";
                    else if (row['訂單狀態'] === '已出貨') statusClass = "bg-indigo-100 text-indigo-700 border-indigo-200";
                    
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-medium">${row.row_number || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-blue-600">${row['訂單編號'] || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${row['客戶編號'] || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">${row['姓名'] || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row['訂單日期'] || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">${row['商品名稱'] || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${row['訂單金額'] || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium border ${statusClass}">
                                ${row['訂單狀態'] || '-'}
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            }
            resultCard.classList.remove('hidden');
        }

        // 表單送出事件處理
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const queryName = searchInput.value.trim();
            const queryOrderId = searchOrderIdInput.value.trim();
            
            if (!queryName && !queryOrderId) {
                showAlert('warning', '提示', '請至少輸入「姓名」或「訂單編號」其中一項來進行查詢。');
                return;
            }

            setLoadingState(true);

            // Payload: 包含姓名與訂單編號
            const payload = {
                "name": queryName,
                "訂單編號": queryOrderId
            };

            try {
                // 發送 POST 請求至 n8n Webhook
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const responseData = await response.json();
                
                // 確認回傳的是否為陣列格式
                if (Array.isArray(responseData)) {
                    showAlert('success', '查詢成功', '已成功從 n8n 取得資料。');
                    renderTable(responseData);
                } else {
                    throw new Error("回傳的資料格式不是陣列 (Array)，請檢查 n8n 最後一個節點的輸出。");
                }

            } catch (error) {
                console.error('Webhook 請求失敗:', error);
                
                // 【模擬資料區塊】作為失敗時的備案
                const mockData = [
                    {
                        "row_number": 20,
                        "訂單編號": queryOrderId || "ORD2024019",
                        "客戶編號": "C019",
                        "姓名": queryName || "Christopher Clark",
                        "訂單日期": "2024-05-17",
                        "商品名稱": "27吋顯示器 (x3)",
                        "訂單金額": "NT$18,000",
                        "訂單狀態": "已完成"
                    }
                ];

                // 如果失敗，提醒使用者檢查 n8n 設定
                setTimeout(() => {
                    showAlert('warning', '無法取得真實資料，已切換至模擬模式', `連線失敗 (${error.message})。請確認您的 n8n 工作流程已設為「Active (啟用)」。目前展示的是模擬資料。`);
                    renderTable(mockData);
                    setLoadingState(false);
                }, 800);
                
                return;
            }

            setLoadingState(false);
        });
    </script>
</body>
</html>
